<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftDesk — Payment Successful</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--background); }
    .success-card {
      background: white;
      border-radius: 24px;
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .success-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #0e9f6e, #10b981);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.25rem;
      margin: 0 auto 24px;
    }
    .plan-badge {
      display: inline-block;
      background: rgba(14,159,110,0.1);
      color: #0e9f6e;
      font-weight: 700;
      font-size: 0.875rem;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .countdown { font-size: 0.875rem; color: var(--text-muted); margin-top: 24px; }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">✅</div>
    <div class="plan-badge" id="plan-badge">Subscription Active</div>
    <h2 style="margin-bottom:12px;">You're all set!</h2>
    <p style="font-size:1.0625rem;margin-bottom:32px;">Your subscription is active. All your AI tools are now unlocked. Let's get to work.</p>
    <a href="/dashboard.html" class="btn btn-primary btn-full btn-lg">Go to Dashboard →</a>
    <p class="countdown">Redirecting automatically in <span id="timer">5</span>s...</p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Show plan name if available
    const params = new URLSearchParams(window.location.search);

    // Auto-redirect countdown
    let seconds = 5;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = '/dashboard.html';
      }
    }, 1000);
  </script>
</body>
</html>
